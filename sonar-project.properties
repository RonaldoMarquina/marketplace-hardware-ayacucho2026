sonar.projectKey=HardwareAyacucho
sonar.projectName=HardwareAyacucho
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.scm.disabled=true

# Analisis principal del monorepo
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests

# Incluye solo los tests reales del backend
sonar.test.inclusions=backend/tests/**/*.py

# Cobertura disponible hoy: backend con pytest-cov
sonar.python.version=3.14
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclusiones de archivos generados o ajenos al analisis
sonar.exclusions=**/__pycache__/**,**/*.pyc,backend/uploads/**,frontend/node_modules/**,frontend/dist/**,.venv/**,**/.pytest_cache/**,**/.pytest_cache_local/**,**/.pytest_tmp/**,.pytest_tmp/**,backend/.pytest_tmp/**,.pytest_cache/**,backend/.pytest_cache/**,backend/.pytest_cache_local/**

# Mantener frontend en analisis estatico aunque aun no tenga lcov
sonar.coverage.exclusions=frontend/src/**
