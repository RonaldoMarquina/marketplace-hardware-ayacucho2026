[pytest]
testpaths = backend/tests
addopts = --basetemp=.pytest_tmp_root -p no:cacheprovider
filterwarnings =
    ignore:unclosed file <_io\.FileIO name=.*:ResourceWarning
    ignore:Implicitly cleaning up <_TemporaryFileWrapper.*:ResourceWarning
markers =
    integration: pruebas de integracion con app, db, cliente Flask o endpoints
    unit: pruebas unitarias puras sin app ni base de datos
